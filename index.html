<script>
    // ============================================================
    // ⚙️ CONFIGURAÇÕES GERAIS
    // ============================================================
    
    const LINKS_PASSWORD = "cbmgo193";  // 🔑 SENHA - ALTERE AQUI
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzB_ZOh57vlXnIScLwDVsTHXtlkJ3AdBnzZPjvaJHiPBzrnzdH8MxTAhxGkJFKNzEU/exec";
    
    // 🗂️ MAPEAMENTO: UNIDADE → LINHA NA PLANILHA
    const UNIT_MAPPING = {
        "11º BBM/Porangatu": { row: 2, slug: "Porangatu" },
        "18º BBM/Goianésia": { row: 3, slug: "Goianesia" },
        "1ª CIBM/Minaçu": { row: 4, slug: "Minacu" },
        "6ª CIBM/Niquelândia": { row: 5, slug: "Niquelandia" },
        "11ª CIBM/Uruaçu": { row: 6, slug: "Uruacu" },
        "22ª CIBM/São Miguel do Araguaia": { row: 7, slug: "Miguel" },
        "DBM de Barro Alto": { row: 8, slug: "Barro" }
    };
    
    // 📊 MAPEAMENTO: CAMPO → COLUNA NA PLANILHA
    const COL = {
        NOME: 1, EFETIVO: 2, VTRS: 3, BAIXAS: 4, OFICIAL: 5, CONTATO: 6,
        RES: 7, URB: 8, VEG: 9, SALV: 10, PREV: 11, OUT: 12, SOMA: 13, DATA: 14
    };

    // ============================================================
    // 🧠 ESTADO GLOBAL
    // ============================================================
    
    let currentUnit = null;
    let linksUnlocked = false;
    let cachedData = null; // 🚀 Cache dos dados da planilha
    let lastLoadTime = null;

    // ============================================================
    // 🚀 INICIALIZAÇÃO
    // ============================================================
    
    document.addEventListener('DOMContentLoaded', () => {
        updateClock();
        setInterval(updateClock, 1000);
        checkUrlUnitParam();
        
        if (!currentUnit) {
            document.getElementById('btn-input').classList.add('hidden');
            loadDashboard(); // 🚀 Carrega com leitura em massa
        } else {
            setupUnitForm();
            switchTab('input');
        }
        
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
        }, 1000);
    });

    function updateClock() {
        const now = new Date();
        document.getElementById('current-date').innerText = 
            now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR');
    }

    // ============================================================
    // 🔐 CONTROLE DE ACESSO
    // ============================================================
    
    function checkLinksAccess() {
        if (linksUnlocked) {
            switchTab('links');
            generateLinksUI();
            return;
        }
        document.getElementById('password-modal').classList.remove('hidden');
        document.getElementById('password-input').value = '';
        document.getElementById('password-error').classList.add('hidden');
        document.getElementById('password-input').focus();
    }

    function closePasswordModal() {
        document.getElementById('password-modal').classList.add('hidden');
    }

    function checkPassword() {
        const input = document.getElementById('password-input').value.trim();
        if (input === LINKS_PASSWORD) {
            linksUnlocked = true;
            closePasswordModal();
            switchTab('links');
            generateLinksUI();
        } else {
            document.getElementById('password-error').classList.remove('hidden');
            document.getElementById('password-input').value = '';
            document.getElementById('password-input').focus();
        }
    }

    document.getElementById('password-input')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
    });

    // ============================================================
    // 🔗 PARÂMETROS DE URL
    // ============================================================
    
    function checkUrlUnitParam() {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('unidade');
        if (slug) {
            for (const [name, config] of Object.entries(UNIT_MAPPING)) {
                if (config.slug.toLowerCase() === slug.toLowerCase()) {
                    currentUnit = name;
                    break;
                }
            }
        }
    }

    function setupUnitForm() {
        if (!currentUnit || !UNIT_MAPPING[currentUnit]) {
            alert("⚠️ Unidade não identificada.");
            switchTab('dashboard');
            return;
        }
        
        document.getElementById('form-unidade').value = currentUnit;
        document.getElementById('display-unidade').innerText = currentUnit;
        document.getElementById('locked-unit-name').innerText = currentUnit;
        document.getElementById('btn-input').classList.remove('hidden');
        loadUnitData(currentUnit);
    }

    function exitUnitMode() {
        currentUnit = null;
        document.getElementById('btn-input').classList.add('hidden');
        switchTab('dashboard');
        loadDashboard();
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    // ============================================================
    // 🔄 NAVEGAÇÃO E UTILITÁRIOS
    // ============================================================
    
    function switchTab(tabName) {
        ['dashboard', 'input', 'links'].forEach(t => {
            document.getElementById('tab-' + t).classList.add('hidden');
            document.getElementById('btn-' + t).classList.remove('tab-active');
        });
        document.getElementById('tab-' + tabName).classList.remove('hidden');
        document.getElementById('btn-' + tabName).classList.add('tab-active');
        
        // 🚀 Recarrega dashboard se voltar para ele e os dados estiverem desatualizados
        if (tabName === 'dashboard' && (!cachedData || Date.now() - lastLoadTime > 30000)) {
            loadDashboard();
        }
    }

    function copyToClipboard(elementId) {
        const el = document.getElementById(elementId);
        el.select();
        el.setSelectionRange(0, 99999);
        document.execCommand('copy');
        const original = el.title || '';
        el.title = "✅ Copiado!";
        setTimeout(() => { el.title = original; }, 2000);
    }

    function generateLinksUI() {
        const container = document.getElementById('link-list-container');
        const baseUrl = window.location.href.split('?')[0].replace(/\/$/, '');
        
        document.getElementById('admin-link-field').value = baseUrl;
        container.innerHTML = '';

        Object.entries(UNIT_MAPPING).forEach(([unitName, config], index) => {
            const unitLink = `${baseUrl}?unidade=${config.slug}`;
            const div = document.createElement('div');
            div.className = "p-4 bg-white border border-gray-200 rounded-lg flex flex-col md:flex-row items-start md:items-center justify-between gap-3 shadow-sm hover:border-blue-400 transition-all";
            div.innerHTML = `
                <div class="flex-1 min-w-0">
                    <span class="block text-xs font-black text-gray-800 uppercase tracking-tight mb-1">${unitName}</span>
                    <input type="text" id="link-${index}" readonly value="${unitLink}" 
                        class="w-full bg-gray-50 text-[10px] text-blue-600 font-mono p-2 rounded border border-gray-200 focus:outline-none truncate">
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="copyToClipboard('link-${index}')" 
                        class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-[10px] font-bold uppercase transition-all">
                        📋 Copiar
                    </button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // ============================================================
    // 📡 COMUNICAÇÃO COM APPS SCRIPT
    // ============================================================
    
    async function callScript(action, params = {}) {
        const url = new URL(SCRIPT_URL);
        url.searchParams.append('acao', action);
        Object.entries(params).forEach(([key, value]) => {
            if (value !== null && value !== undefined) {
                url.searchParams.append(key, value);
            }
        });
        
        try {
            const response = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
            return await response.json();
        } catch (error) {
            console.error('❌ Erro na chamada do script:', error);
            return { sucesso: false, mensagem: 'Erro de conexão: ' + error.message };
        }
    }

    // ============================================================
    // 🚀 CARREGAMENTO RÁPIDO DO DASHBOARD (LEITURA EM MASSA)
    // ============================================================
    
    async function loadDashboard() {
        const tbody = document.getElementById('consolidated-body');
        
        // Mostra estado de carregamento
        tbody.innerHTML = '<tr><td colspan="12" class="p-4 text-center text-blue-600 font-bold animate-pulse">🔄 Carregando dados da planilha...</td></tr>';
        
        try {
            // 🚀 CHAMADA ÚNICA PARA LER TODA A PLANILHA
            const result = await callScript('ler-tudo');
            
            if (!result.sucesso || !result.dados?.unidades) {
                throw new Error(result.mensagem || 'Falha ao carregar dados');
            }
            
            // Cache dos dados para reutilização
            cachedData = result.dados.unidades;
            lastLoadTime = Date.now();
            
            // Processa e renderiza
            renderDashboardTable(cachedData);
            updateStatsCards(cachedData);
            
            document.getElementById('stat-ultima-att').innerText = new Date().toLocaleTimeString('pt-BR');
            
        } catch (error) {
            console.error('Erro no loadDashboard:', error);
            tbody.innerHTML = `<tr><td colspan="12" class="p-4 text-center text-red-600 font-bold">❌ Erro: ${error.message}<br><button onclick="loadDashboard()" class="mt-2 text-xs bg-red-100 px-3 py-1 rounded hover:bg-red-200">🔄 Tentar novamente</button></td></tr>`;
        }
    }

    function renderDashboardTable(unidades) {
        const tbody = document.getElementById('consolidated-body');
        tbody.innerHTML = '';
        
        if (!unidades || unidades.length === 0) {
            tbody.innerHTML = '<tr><td colspan="12" class="p-4 text-center text-gray-500">Nenhuma unidade encontrada na planilha</td></tr>';
            return;
        }
        
        unidades.forEach(unit => {
            const d = unit.dados;
            const efetivoClass = (d.efetivo < 8 && d.efetivo > 0) ? 'text-red-600 bg-red-50 font-black' : 'text-blue-700 font-bold';
            const baixasClass = (d.baixas && d.baixas !== 'Nenhuma' && d.baixas !== '-') ? 'text-red-700 font-bold bg-red-50' : 'text-gray-500';
            
            const tr = document.createElement('tr');
            tr.className = "border-b hover:bg-gray-50 transition-colors";
            tr.innerHTML = `
                <td class="p-3 font-bold border-r text-gray-700">${unit.unidade}</td>
                <td class="p-3 text-center border-r ${efetivoClass}">${d.efetivo}</td>
                <td class="p-3 text-[11px] border-r italic text-gray-600">${d.vtrAtivas || '-'}</td>
                <td class="p-3 text-[11px] border-r ${baixasClass}">${d.baixas || '-'}</td>
                <td class="td-small">${d.ocorrencias?.resgate || 0}</td>
                <td class="td-small">${d.ocorrencias?.urbano || 0}</td>
                <td class="td-small">${d.ocorrencias?.veg || 0}</td>
                <td class="td-small">${d.ocorrencias?.busca || 0}</td>
                <td class="td-small">${d.ocorrencias?.prev || 0}</td>
                <td class="td-small">${d.ocorrencias?.outras || 0}</td>
                <td class="td-small bg-blue-50 font-black border-r border-l text-blue-900">${d.soma || 0}</td>
                <td class="p-2 text-center bg-gray-50">
                    <div class="font-bold text-[11px]">${d.oficialNome || '-'}</div>
                    <div class="text-[9px] text-blue-600">${d.oficialContato || '-'}</div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateStatsCards(unidades) {
        let totalEfetivo = 0, totalOcorrencias = 0, unidadesPendentes = 0;
        
        unidades.forEach(unit => {
            const d = unit.dados;
            totalEfetivo += parseInt(d.efetivo) || 0;
            totalOcorrencias += parseInt(d.soma) || 0;
            if (d.baixas && d.baixas !== 'Nenhuma' && d.baixas !== '-') {
                unidadesPendentes++;
            }
        });
        
        document.getElementById('stat-efetivo-total').innerText = totalEfetivo;
        document.getElementById('stat-ocorrencias').innerText = totalOcorrencias;
        document.getElementById('stat-pendencias').innerText = unidadesPendentes;
    }

    // ============================================================
    // 💾 SALVAR DADOS (FORMULÁRIO DA UNIDADE)
    // ============================================================
    
    async function saveData() {
        if (!currentUnit) {
            alert("⚠️ Unidade não identificada!");
            return;
        }
        
        const btn = document.getElementById('btn-save');
        const status = document.getElementById('save-status');
        const row = UNIT_MAPPING[currentUnit].row;
        
        // Coleta dados
        const getNum = (id) => parseInt(document.getElementById(id).value) || 0;
        const getText = (id) => document.getElementById(id).value?.trim() || '-';
        
        const dados = {
            efetivo: getNum('form-efetivo'),
            vtrAtivas: getText('form-vtr-ativas'),
            baixas: getText('form-baixas'),
            oficialNome: getText('form-oficial-nome'),
            oficialContato: getText('form-oficial-contato'),
            resgate: getNum('oc-resgate'),
            urbano: getNum('oc-urbano'),
            veg: getNum('oc-veg'),
            busca: getNum('oc-busca'),
            prev: getNum('oc-prev'),
            outras: getNum('oc-outras')
        };
        dados.soma = dados.resgate + dados.urbano + dados.veg + dados.busca + dados.prev + dados.outras;
        dados.updatedAt = new Date().toLocaleString('pt-BR');
        
        // UI de envio
        btn.disabled = true;
        btn.innerHTML = '⏳ ENVIANDO...';
        status.innerText = '';
        
        try {
            // Envia todos os campos em paralelo
            const writes = [
                callScript('gravar', { linha: row, coluna: COL.EFETIVO, valor: dados.efetivo }),
                callScript('gravar', { linha: row, coluna: COL.VTRS, valor: dados.vtrAtivas }),
                callScript('gravar', { linha: row, coluna: COL.BAIXAS, valor: dados.baixas }),
                callScript('gravar', { linha: row, coluna: COL.OFICIAL, valor: dados.oficialNome }),
                callScript('gravar', { linha: row, coluna: COL.CONTATO, valor: dados.oficialContato }),
                callScript('gravar', { linha: row, coluna: COL.RES, valor: dados.resgate }),
                callScript('gravar', { linha: row, coluna: COL.URB, valor: dados.urbano }),
                callScript('gravar', { linha: row, coluna: COL.VEG, valor: dados.veg }),
                callScript('gravar', { linha: row, coluna: COL.SALV, valor: dados.busca }),
                callScript('gravar', { linha: row, coluna: COL.PREV, valor: dados.prev }),
                callScript('gravar', { linha: row, coluna: COL.OUT, valor: dados.outras }),
                callScript('gravar', { linha: row, coluna: COL.SOMA, valor: dados.soma }),
                callScript('gravar', { linha: row, coluna: COL.DATA, valor: dados.updatedAt })
            ];
            
            await Promise.all(writes);
            
            // 🚀 Invalida cache para forçar recarregamento no dashboard
            cachedData = null;
            
            status.innerText = '✅ Dados enviados com sucesso!';
            status.className = 'text-center text-xs mt-2 font-bold text-green-600';
            
            // Se o dashboard estiver visível, recarrega imediatamente
            if (!document.getElementById('tab-dashboard').classList.contains('hidden')) {
                await loadDashboard();
            }
            
        } catch (error) {
            status.innerText = '❌ Erro: ' + error.message;
            status.className = 'text-center text-xs mt-2 font-bold text-red-600';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '📤 Enviar Dados ao 8º CRBM';
        }
    }

    // ============================================================
    // 📖 CARREGAR DADOS DE UMA UNIDADE (PARA EDIÇÃO)
    // ============================================================
    
    async function loadUnitData(unitName) {
        // 🚀 Tenta usar cache se disponível e recente
        if (cachedData && lastLoadTime && (Date.now() - lastLoadTime < 60000)) {
            const cached = cachedData.find(u => u.unidade === unitName);
            if (cached) {
                fillFormFromData(cached.dados);
                return;
            }
        }
        
        // Fallback: leitura individual campo a campo
        const row = UNIT_MAPPING[unitName].row;
        const fields = [
            { col: COL.EFETIVO, id: 'form-efetivo' },
            { col: COL.VTRS, id: 'form-vtr-ativas' },
            { col: COL.BAIXAS, id: 'form-baixas' },
            { col: COL.OFICIAL, id: 'form-oficial-nome' },
            { col: COL.CONTATO, id: 'form-oficial-contato' },
            { col: COL.RES, id: 'oc-resgate' },
            { col: COL.URB, id: 'oc-urbano' },
            { col: COL.VEG, id: 'oc-veg' },
            { col: COL.SALV, id: 'oc-busca' },
            { col: COL.PREV, id: 'oc-prev' },
            { col: COL.OUT, id: 'oc-outras' }
        ];
        
        for (const field of fields) {
            try {
                const result = await callScript('ler', { linha: row, coluna: field.col });
                if (result.sucesso && result.dados?.conteudo !== null) {
                    document.getElementById(field.id).value = result.dados.conteudo;
                }
            } catch (e) {
                console.warn(`Não foi possível carregar ${field.id}:`, e);
            }
        }
    }

    function fillFormFromData(data) {
        if (!data) return;
        
        document.getElementById('form-efetivo').value = data.efetivo || '';
        document.getElementById('form-vtr-ativas').value = data.vtrAtivas || '';
        document.getElementById('form-baixas').value = data.baixas || '';
        document.getElementById('form-oficial-nome').value = data.oficialNome || '';
        document.getElementById('form-oficial-contato').value = data.oficialContato || '';
        
        if (data.ocorrencias) {
            document.getElementById('oc-resgate').value = data.ocorrencias.resgate || 0;
            document.getElementById('oc-urbano').value = data.ocorrencias.urbano || 0;
            document.getElementById('oc-veg').value = data.ocorrencias.veg || 0;
            document.getElementById('oc-busca').value = data.ocorrencias.busca || 0;
            document.getElementById('oc-prev').value = data.ocorrencias.prev || 0;
            document.getElementById('oc-outras').value = data.ocorrencias.outras || 0;
        }
    }
</script>
